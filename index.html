<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria - Registro de Mascotas</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        form, .listado-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { grid-column: span 2; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #0056b3; color: white; }
        #mensaje { text-align: center; font-weight: bold; margin-top: 10px; display: none; }
        .filtro-container { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <form id="formMascota">
        <h2>Registro de Paciente Veterinario</h2>
        
        <h3>Datos del Dueño (¡Recuerda, el primero debes ser tú!)</h3>
        <div class="form-grid">
            <div class="form-group"><label>Nombres</label><input type="text" id="nombre_dueno" required></div>
            <div class="form-group"><label>Apellidos</label><input type="text" id="apellido_dueno" required></div>
            <div class="form-group"><label>DNI (Par)</label><input type="text" id="dni_dueno" maxlength="8" required></div>
            <div class="form-group"><label>Celular</label><input type="text" id="celular" required></div>
            <div class="form-group" style="grid-column: span 2;"><label>Correo</label><input type="email" id="correo"></div>
        </div>

        <h3>Datos de la Mascota</h3>
        <div class="form-grid">
            <div class="form-group"><label>Nombre Mascota</label><input type="text" id="nombre_mascota" required></div>
            <div class="form-group"><label>Edad (Años)</label><input type="number" id="edad" required></div>
            <div class="form-group"><label>Peso (Kg)</label><input type="number" step="0.1" id="peso" required></div>
            
            <div class="form-group"><label>Especie</label><select id="especie_id" required><option value="">Seleccione...</option></select></div>
            <div class="form-group"><label>Raza</label><select id="raza_id" required><option value="">Seleccione...</option></select></div>
            <div class="form-group"><label>Tipo Atención</label><select id="tipo_atencion_id" required><option value="">Seleccione...</option></select></div>
            <div class="form-group"><label>Condición Médica</label><select id="condicion_medica_id" required><option value="">Seleccione...</option></select></div>
            
            <div class="form-group" style="grid-column: span 2;">
                <label>Observaciones</label><textarea id="observaciones"></textarea>
            </div>
            
            <button type="submit">Registrar Mascota</button>
        </div>
        <div id="mensaje"></div>
    </form>

    <div class="listado-section">
        <h2>Mascotas Registradas</h2>
        <div class="filtro-container">
            <label for="filtroEspecie"><strong>Filtrar por Especie:</strong></label>
            <select id="filtroEspecie">
                <option value="todas">Mostrar Todas</option>
                </select>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Mascota</th><th>Edad</th><th>Peso</th><th>Especie</th><th>Raza</th>
                    <th>Dueño</th><th>DNI</th><th>Celular</th><th>Atención</th><th>Condición</th>
                </tr>
            </thead>
            <tbody id="tablaMascotas">
                </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
